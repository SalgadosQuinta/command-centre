<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasks</title>
<meta name="theme-color" content="#0f1216">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<script>
if ('serviceWorker' in navigator && location.protocol === 'https:') {
  window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js', {updateViaCache:'none'}).then(function(reg){ if(reg&&reg.update) reg.update(); }).catch(function(){});
    (function(){ var r=false; navigator.serviceWorker.addEventListener('controllerchange', function(){ if(r) return; r=true; if(sessionStorage.getItem('sw-reloaded')==='1') return; sessionStorage.setItem('sw-reloaded','1'); location.reload(); }); })(); });
}

<style>
:root{
  --bg:#0f1216; --panel:#171b21; --panel2:#1d2229; --line:#262c35;
  --text:#e8e6e1; --muted:#9aa3ad; --faint:#6b7480; --accent:#c9a227;
  --ok:#4caf7d; --danger:#e05d5d; --warn:#d9a13b;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:14px 14px 40px}
body.inapp .wrap{padding-top:calc(66px + env(safe-area-inset-top,0px))}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}
h1{font-size:19px;font-weight:650;margin:2px 0}
.sub{color:var(--muted);font-size:12.5px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:13px;margin-top:12px}
label{display:block;font-size:10.5px;color:var(--muted);margin:9px 0 4px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase}
input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);padding:9px 10px;font-size:14px;font-family:var(--sans)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
.btn{display:inline-block;background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:7px;padding:9px 13px;font-size:13px;cursor:pointer;font-family:var(--sans)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#14110a;font-weight:650}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.ghost{background:transparent}
.btn.danger{border-color:var(--danger);color:var(--danger)}
.btn:disabled{opacity:.5;cursor:default}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--muted);white-space:nowrap}
.pill.sent,.pill.open{color:var(--accent);border-color:var(--accent)}
.pill.done{color:var(--ok);border-color:var(--ok)}
.pill.in_progress,.pill.accepted{color:var(--warn);border-color:var(--warn)}
.pill.declined{color:var(--danger);border-color:var(--danger)}
.task{border-left:3px solid var(--line);padding-left:11px;margin:12px 0}
.task.unseen{border-left-color:var(--accent)}
.task.overdue{border-left-color:var(--danger)}
.ttl{font-size:14.5px;font-weight:600}
.ttl.donetxt{text-decoration:line-through;color:var(--faint)}
.meta{color:var(--faint);font-size:11.5px;font-family:var(--mono);margin:3px 0 5px}
.meta .od{color:var(--danger)}
.notes{color:var(--muted);font-size:13px;white-space:pre-wrap;margin-bottom:7px}
.comment{background:var(--panel2);border-radius:7px;padding:7px 10px;font-size:12.5px;margin-top:6px}
.comment .who{font-family:var(--mono);font-size:10px;color:var(--faint)}
.tabs{position:fixed;top:0;left:0;right:0;background:var(--panel);border-bottom:1px solid var(--line);display:flex;z-index:5;padding-top:env(safe-area-inset-top,0px)}
.tabs button{flex:1;background:none;border:none;color:var(--muted);padding:11px 0;font-size:10.5px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent}
.tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
.tabs .n{display:block;font-size:14px;margin-bottom:1px}
.bal{font-size:25px;font-weight:650;font-family:var(--mono);margin-top:4px}
.bal.neg{color:var(--danger)}
.tx{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.tx:last-child{border-bottom:none}
.tx .amt{font-family:var(--mono);white-space:nowrap}
.tx .amt.spend{color:var(--danger)}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--accent);border-radius:8px;padding:9px 16px;font-size:13px;z-index:20;max-width:90vw}
.hidden{display:none!important}
a{color:var(--accent)}
.empty{color:var(--faint);text-align:center;padding:24px 0;font-size:13px}
.topline{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.grouphead{margin:14px 0 2px}
.qadd{display:flex;gap:8px;margin-top:10px}
.qadd input{flex:1}
.badge{font-family:var(--mono);font-size:10px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:2px 8px;color:var(--muted)}
/* calendar */
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.calhead b{font-size:14.5px}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.caldow{font-family:var(--mono);font-size:9.5px;color:var(--faint);text-align:center;text-transform:uppercase;padding:3px 0}
.calcell{background:var(--panel2);border:1px solid var(--line);border-radius:6px;min-height:44px;padding:3px 4px;font-size:11px;cursor:pointer;position:relative}
.calcell.out{opacity:.35}
.calcell.today{border-color:var(--accent)}
.calcell.sel{outline:2px solid var(--accent)}
.calcell .dn{font-family:var(--mono);font-size:10px;color:var(--muted)}
.dots{display:flex;gap:2px;flex-wrap:wrap;margin-top:3px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.dot.mine{background:var(--muted)}
.dot.od{background:var(--danger)}
.fieldrow{display:flex;gap:8px}
.fieldrow>*{flex:1}
details.newtask summary{cursor:pointer;font-size:13px;color:var(--accent);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;font-size:11px;list-style:none;padding:2px 0}
details.newtask summary::-webkit-details-marker{display:none}
/* modals */
.overlay{position:fixed;inset:0;background:rgba(6,8,10,.55);display:flex;align-items:flex-start;justify-content:center;padding:6vh 14px;z-index:30;backdrop-filter:blur(2px)}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:12px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;padding:16px}
.modalfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
@media(max-width:600px){
  .overlay{padding:0;align-items:stretch}
  .modal{max-width:100%;max-height:100dvh;height:100dvh;border-radius:0;padding:16px 14px calc(18px + env(safe-area-inset-bottom,0px))}
  .modalfoot{position:sticky;bottom:0;background:var(--panel);padding-top:10px}
  .modalfoot .btn{flex:1;text-align:center}
}
/* desktop layout: tabs across the top, wider workspace, two-column sections */
@media(min-width:861px){
  .tabs{justify-content:center;gap:6px}
  .tabs button{flex:0 0 auto;padding:13px 22px;font-size:11px}
  .tabs .n{display:none}
  .wrap{max-width:980px}
  body.inapp .wrap{padding-top:76px}
  .desk2{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
  .desk2>.card{margin-top:12px}
  .calcell{min-height:92px;font-size:12px}
  .task{margin:14px 0}
}
</style>
</head>
<body>
<div class="wrap">
  <!-- SIGN IN -->
  <div id="authView">
    <div style="margin:26px 0 4px;text-align:center">
      <div class="eyebrow">Command Centre</div>
      <h1>Tasks</h1>
      <div class="sub" style="margin-bottom:14px">Your tasks, calendar and money — in one place.</div>
    </div>
    <div class="card">
      <label>Email</label><input id="aEmail" type="email" autocomplete="username">
      <label>Password</label><input id="aPass" type="password" autocomplete="current-password">
      <div class="row" style="margin-top:14px">
        <button class="btn primary" id="aIn">Sign in</button>
        <button class="btn" id="aUp">Create account</button>
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="appView" class="hidden">
    <div class="topline">
      <div><div class="eyebrow">Command Centre</div><h1 id="viewTitle">Inbox</h1><div class="sub" id="whoLine"></div></div>
      <div class="row"><button class="btn sm" id="refreshBtn">Refresh</button><button class="btn sm ghost" id="outBtn">Sign out</button></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<div id="modalHost"></div>
<div class="tabs hidden" id="tabs">
  <button data-tab="inbox" class="on"><span class="n">▤</span>Home</button>
  <button data-tab="mine"><span class="n">✓</span>My tasks</button>
  <button data-tab="calendar"><span class="n">▦</span>Calendar</button>
  <button data-tab="money"><span class="n">$</span>Money</button>
</div>

<script>
const CLOUD={url:"https://ejlsbydsqjbxfwmvlapm.supabase.co",key:"sb_publishable_hB7hrrTkLMNh6FrH_FTUSg_cxIlM9Nt"};
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function toast(m){const t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3200);}
const fmtD=s=>{if(!s)return "";const d=new Date(s);return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});};
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const nowISO=()=>new Date().toISOString();

const Cloud={
  session:null,
  load(){try{this.session=JSON.parse(localStorage.getItem("tasks-cloud")||"null")}catch(e){this.session=null}},
  store(s){this.session=s;if(s)localStorage.setItem("tasks-cloud",JSON.stringify(s));else localStorage.removeItem("tasks-cloud")},
  me(){return this.session&&this.session.user},
  async auth(path,body){
    const r=await fetch(`${CLOUD.url}/auth/v1/${path}`,{method:"POST",headers:{apikey:CLOUD.key,"Content-Type":"application/json"},body:JSON.stringify(body)});
    const d=await r.json();
    if(!r.ok)throw new Error(d.msg||d.error_description||d.message||"Sign in failed");
    return d;
  },
  async signIn(e,p){const d=await this.auth("token?grant_type=password",{email:e,password:p});this.store({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});},
  async signUp(e,p){const d=await this.auth("signup",{email:e,password:p});if(d.access_token){this.store({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});return true;}return false;},
  async refresh(){if(!this.session)return false;try{const d=await this.auth("token?grant_type=refresh_token",{refresh_token:this.session.refresh_token});this.store({access_token:d.access_token,refresh_token:d.refresh_token,user:d.user});return true;}catch(e){this.store(null);return false;}},
  async api(path,opts,retried){
    opts=opts||{};
    const r=await fetch(`${CLOUD.url}/rest/v1/${path}`,{method:opts.method||"GET",
      headers:Object.assign({apikey:CLOUD.key,Authorization:"Bearer "+this.session.access_token,"Content-Type":"application/json",Prefer:opts.prefer||"return=representation"},opts.headers||{}),
      body:opts.body?JSON.stringify(opts.body):undefined});
    if(r.status===401&&!retried&&await this.refresh())return this.api(path,opts,true);
    if(!r.ok){throw new Error("Error: "+(await r.text()).slice(0,160));}
    const bodyText=await r.text();
    if(!bodyText||!bodyText.trim())return null;
    try{return JSON.parse(bodyText);}catch(e){return null;}
  },
  async upload(path,file){
    const r=await fetch(`${CLOUD.url}/storage/v1/object/receipts/${path}`,{method:"POST",headers:{apikey:CLOUD.key,Authorization:"Bearer "+this.session.access_token,"Content-Type":file.type||"application/octet-stream"},body:file});
    if(!r.ok)throw new Error("Photo upload failed");
    return path;
  },
  async signedUrl(path){
    const r=await fetch(`${CLOUD.url}/storage/v1/object/sign/receipts/${path}`,{method:"POST",headers:{apikey:CLOUD.key,Authorization:"Bearer "+this.session.access_token,"Content-Type":"application/json"},body:JSON.stringify({expiresIn:3600})});
    const d=await r.json();
    if(!r.ok||!d.signedURL)throw new Error("Could not open receipt");
    return CLOUD.url+"/storage/v1"+d.signedURL;
  }
};
Cloud.load();

const VAPID_PUBLIC="BLVIKKCjHYJollBuxb00jUN2eVIAeRbjmRGcNoDSQKawpJum1g6Srq0ZZGPC6YynIMtGGlSGN5ok4v-82ttnJnw";
const Push={
  b64(s){const p="=".repeat((4-s.length%4)%4);const b=(s+p).replace(/-/g,"+").replace(/_/g,"/");const r=atob(b);return Uint8Array.from([...r].map(c=>c.charCodeAt(0)));},
  supported(){return "serviceWorker" in navigator&&"PushManager" in window&&location.protocol==="https:";},
  async subscribe(){
    const perm=await Notification.requestPermission();
    if(perm!=="granted")throw new Error("Permission not granted");
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:this.b64(VAPID_PUBLIC)});
    await Cloud.api("push_subscriptions",{method:"POST",prefer:"return=minimal",body:{user_id:Cloud.me().id,subscription:sub.toJSON()}});
    localStorage.setItem("tasks-push","on");
  },
  async notify(to,title,body,url){
    try{await fetch(`${CLOUD.url}/functions/v1/notify`,{method:"POST",headers:{apikey:CLOUD.key,Authorization:"Bearer "+Cloud.session.access_token,"Content-Type":"application/json"},body:JSON.stringify({to_user_id:to,title,body:body||"",url:url||"./"})});}catch(e){}
  }
};
let ALL=[],TX=[],PROFILES=[],TAB="inbox",CALM=null,CALSEL=null,CALVIEW="month",SHOWDONE=false;

const assignedToMe=()=>ALL.filter(t=>t.assignee_id===Cloud.me().id);
const delegatedByMe=()=>ALL.filter(t=>t.owner_id===Cloud.me().id&&t.assignee_id!==Cloud.me().id);
const inboxTasks=()=>ALL.filter(t=>t.assignee_id===Cloud.me().id&&t.owner_id!==Cloud.me().id);
const myTasks=()=>ALL.filter(t=>t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id);
const isClosed=t=>["done","declined"].includes(t.status);
const isOver=t=>t.due_date&&!isClosed(t)&&t.due_date<todayStr();
/* ---- Day / Week / Month range views (overdue always included) ---- */
let RANGE="all";
function rangeSpan(){
  const t=todayStr();
  if(RANGE==="day") return [t,t];
  if(RANGE==="week"){
    const d=new Date(); d.setDate(d.getDate()-((d.getDay()+6)%7));
    const f=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    const e=new Date(d); e.setDate(d.getDate()+6);
    return [f, e.getFullYear()+"-"+String(e.getMonth()+1).padStart(2,"0")+"-"+String(e.getDate()).padStart(2,"0")];
  }
  if(RANGE==="month"){
    const d=new Date();
    const f=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-01";
    const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    return [f, d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(last).padStart(2,"0")];
  }
  return null;
}
const inRange=t=>{ const s=rangeSpan(); if(!s) return true; return !!t.due_date&&t.due_date<=s[1]&&(t.due_date>=s[0]||t.due_date<todayStr()); };
const rangeBar=()=>`<div class="card" style="padding:8px 10px;display:flex;gap:6px;flex-wrap:wrap">
  ${[["all","All"],["day","Day"],["week","Week"],["month","Month"]].map(([r,l])=>`<button class="btn sm ${RANGE===r?"primary":""}" data-range="${r}">${l}</button>`).join("")}
  ${RANGE!=="all"?`<span class="sub" style="align-self:center">overdue included · undated under All</span>`:""}</div>`;
function dateGroupHTML(list,mine){
  const tStr=todayStr(), groups={};
  list.forEach(t=>{
    const k=t.due_date<tStr?"Overdue":t.due_date===tStr?"Today":new Date(t.due_date+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"});
    (groups[k]=groups[k]||[]).push(t);
  });
  const keys=Object.keys(groups).sort((a,b)=>{
    const ord=k=>k==="Overdue"?"0":k==="Today"?"1":(groups[k][0].due_date||"9999");
    return String(ord(a)).localeCompare(String(ord(b)));
  });
  if(!keys.length) return `<div class="card"><div class="empty">Nothing dated for this ${RANGE}. Undated tasks are under All.</div></div>`;
  return keys.map(k=>`<div class="grouphead"><span class="eyebrow" ${k==="Overdue"?'style="color:var(--danger)"':""}>${esc(k)}</span> <span class="badge">${groups[k].length}</span></div>
    <div class="card" style="margin-top:4px">${groups[k].map(t=>taskHTML(t,mine)).join("")}</div>`).join("");
}

async function loadAll(){
  const me=Cloud.me().id;
  [ALL,TX,PROFILES]=await Promise.all([
    Cloud.api(`cloud_tasks?or=(assignee_id.eq.${me},owner_id.eq.${me})&order=created_at.desc&select=*,owner:owner_id(email,display_name),assignee:assignee_id(email,display_name)`),
    Cloud.api(`transactions?person_id=eq.${me}&order=created_at.desc&select=*,owner:ledger_owner_id(email,display_name)`),
    Cloud.api(`profiles?select=id,email,display_name&order=display_name`)
  ]);
  ALL=ALL||[];TX=TX||[];PROFILES=PROFILES||[];
  const unseen=inboxTasks().filter(t=>t.status==="sent");
  for(const t of unseen){
    try{await Cloud.api(`cloud_tasks?id=eq.${t.id}`,{method:"PATCH",body:{status:"seen",updated_at:nowISO()},prefer:"return=minimal"});t.status="seen";}catch(e){}
  }
  renderApp();
}

function balances(){
  const by={};
  TX.forEach(r=>{const c=r.currency||"USD";by[c]=(by[c]||0)+(r.type==="float"?1:-1)*parseFloat(r.amount);});
  return by;
}
const categories=()=>[...new Set(myTasks().map(t=>t.category).filter(Boolean))].sort();

function renderApp(){
  $("#whoLine").textContent="Signed in as "+Cloud.me().email;
  $("#viewTitle").textContent={inbox:"Home",mine:"My tasks",calendar:"Calendar",money:"Money"}[TAB];
  $$(".tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===TAB));
  const c=$("#content");
  if(TAB==="inbox")c.innerHTML=inboxHTML();
  else if(TAB==="mine")c.innerHTML=mineHTML();
  else if(TAB==="calendar")c.innerHTML=calHTML();
  else c.innerHTML=moneyHTML();
  bind();
}

/* ---------- INBOX (tasks sent to me) ---------- */
function dashHTML(){
  const open=assignedToMe().filter(t=>!isClosed(t));
  const tStr=todayStr();
  const overdue=open.filter(t=>t.due_date&&t.due_date<tStr).sort((a,b)=>a.due_date.localeCompare(b.due_date));
  const today=open.filter(t=>t.due_date===tStr);
  const newIn=inboxTasks().filter(t=>["sent","seen"].includes(t.status));
  const bal=balances();
  const moneyChips=Object.keys(bal).map(c=>{const v=Math.round(bal[c]*100)/100;
    return `<span class="mono" style="font-size:13px;color:${v<0?"var(--danger)":"var(--text)"}">${c} ${(v<0?"−":"")+Math.abs(v).toFixed(2)}${v<0?" owed to you":""}</span>`;}).join(" · ");
  const pushCard=(Push.supported()&&localStorage.getItem("tasks-push")!=="on")?`<div class="card" style="border-left:3px solid var(--accent)"><div class="row" style="justify-content:space-between"><div><div class="eyebrow">Notifications</div><div class="sub" style="margin-top:4px">Get alerted when a new task or float arrives.</div></div><button class="btn primary" id="pushEnable">Enable</button></div></div>`:"";
  const moneyCard=`<div class="card" style="cursor:pointer" data-gotab="money">
    <div class="row" style="justify-content:space-between">
      <div><div class="eyebrow">Money</div>${Object.keys(bal).length?`<div style="margin-top:4px">${moneyChips}</div>`:`<div class="sub" style="margin-top:4px">No entries yet</div>`}</div>
      <div style="text-align:right"><div class="eyebrow">Open tasks</div><div class="bal" style="font-size:21px">${open.length}</div></div>
    </div></div>`;
  if(!overdue.length&&!today.length&&!newIn.length)
    return pushCard+`<div class="card" style="border-left:3px solid var(--ok)"><div class="eyebrow" style="color:var(--ok)">All clear</div><div class="sub" style="margin-top:4px">Nothing overdue and nothing due today.</div></div>`+moneyCard;
  const line=t=>`<div class="tx" style="cursor:pointer" data-goto="${esc(t.id)}"><div>${esc(t.title)}<div class="meta">${t.owner_id!==Cloud.me().id?"from "+esc(t.owner?.display_name||t.owner?.email||""):esc(t.category||"your task")}</div></div><div class="amt ${t.due_date&&t.due_date<tStr?"spend":""}">${t.due_date?esc(fmtD(t.due_date)):""}</div></div>`;

/* ---------- CALENDAR ---------- */
function calHTML(){
  if(!CALM){const d=new Date();CALM={y:d.getFullYear(),m:d.getMonth(),d:d.getDate()};}
  if(CALM.d===undefined){CALM.d=1;}
  const {y,m}=CALM;
  const first=new Date(y,m,1);
  const monthName=first.toLocaleDateString("en-GB",{month:"long",year:"numeric"});
  const tasksByDate={};
  assignedToMe().forEach(t=>{if(t.due_date&&!["declined"].includes(t.status)){(tasksByDate[t.due_date]=tasksByDate[t.due_date]||[]).push(t);}});
  const tStr=todayStr();
  const iso=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const cellFor=(d,extra)=>{
    const ds=iso(d); const its=tasksByDate[ds]||[];
    return `<div class="calcell ${extra||""} ${ds===tStr?"today":""} ${ds===CALSEL?"sel":""}" data-day="${ds}">
      <div class="dn">${d.getDate()}</div>
      <div class="dots">${its.slice(0,6).map(t=>`<span class="dot ${t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id?"mine":""} ${isOver(t)?"od":""}"></span>`).join("")}</div>
    </div>`;
  };
  let grid="", headLabel=monthName;
  if(CALVIEW==="day"){
    const cur=new Date(y,m,CALM.d);
    const ds=iso(cur);
    headLabel=cur.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    const its=(tasksByDate[ds]||[]);
    grid=`<div class="grouphead" style="margin-top:6px"><span class="eyebrow">${ds===tStr?"Today":""}</span></div>
      ${its.length?`<div style="margin-top:4px">${its.map(t=>taskHTML(t,t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id)).join("")}</div>`:`<div class="empty">Nothing due on this day.</div>`}`;
  } else if(CALVIEW==="week"){
    const cur=new Date(y,m,CALM.d);
    const d0=new Date(cur); d0.setDate(cur.getDate()-((cur.getDay()+6)%7));
    const d6=new Date(d0); d6.setDate(d0.getDate()+6);
    headLabel=d0.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+" – "+d6.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
    let cells="";
    for(let i=0;i<7;i++){ const d=new Date(d0); d.setDate(d0.getDate()+i); cells+=cellFor(d); }
    grid=`<div class="calgrid">${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div class="caldow">${d}</div>`).join("")}${cells}</div>`;
  } else { // month
    const startDow=(first.getDay()+6)%7; // Monday first
    const start=new Date(y,m,1-startDow);
    let cells="";
    for(let i=0;i<42;i++){ const d=new Date(start); d.setDate(start.getDate()+i); cells+=cellFor(d, d.getMonth()!==m?"out":""); }
    grid=`<div class="calgrid">${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<div class="caldow">${d}</div>`).join("")}${cells}</div>`;
  }
  const sel=CALVIEW!=="day"&&CALSEL&&tasksByDate[CALSEL]?tasksByDate[CALSEL]:null;
  const upcoming=ALL.filter(t=>t.due_date&&!isClosed(t)).sort((a,b)=>a.due_date.localeCompare(b.due_date)).slice(0,12);
  return `
  <div class="card">
    <div class="calhead"><button class="btn sm" id="calPrev">‹</button><b>${esc(headLabel)}</b><button class="btn sm" id="calNext">›</button></div>
    <div style="display:flex;gap:6px;margin:6px 0">${[["day","Day"],["week","Week"],["month","Month"]].map(([r,l])=>`<button class="btn sm ${CALVIEW===r?"primary":""}" data-calview="${r}">${l}</button>`).join("")}</div>
    ${grid}
    ${CALVIEW!=="day"?`<div class="sub" style="margin-top:8px"><span class="dot" style="display:inline-block"></span> sent to you &nbsp; <span class="dot mine" style="display:inline-block"></span> your own &nbsp; <span class="dot od" style="display:inline-block"></span> overdue</div>`:""}
  </div>
  ${sel?`<div class="grouphead"><span class="eyebrow">${esc(fmtD(CALSEL))}</span></div><div class="card" style="margin-top:4px">${sel.map(t=>taskHTML(t,t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id)).join("")}</div>`:""}
  <div class="grouphead"><span class="eyebrow">Upcoming</span></div>
  <div class="card" style="margin-top:4px">${upcoming.length?upcoming.map(t=>`<div class="tx" style="cursor:pointer" data-goday="${esc(t.due_date)}"><div>${esc(t.title)}<div class="meta">${t.owner_id!==Cloud.me().id||t.assignee_id!==Cloud.me().id?"sent to you":esc(t.category||"your task")}</div></div><div class="amt ${isOver(t)?"spend":""}">${esc(fmtD(t.due_date))}</div></div>`).join(""):`<div class="empty">Nothing scheduled.</div>`}</div>`;
}

async function patchTask(id,body){
  await Cloud.api(`cloud_tasks?id=eq.${id}`,{method:"PATCH",body:Object.assign({updated_at:nowISO()},body),prefer:"return=minimal"});
  const t=ALL.find(x=>x.id===id); Object.assign(t,body);
}
async function addMine(){
  const title=$("#qTitle").value.trim(); if(!title){toast("Type a task first");return;}
  const me=Cloud.me().id;
  try{
    const rows=await Cloud.api("cloud_tasks",{method:"POST",body:{
      owner_id:me,assignee_id:me,title:title,status:"open",
      category:$("#qCat")?.value.trim()||null,due_date:$("#qDue")?.value||null,
      priority:$("#qPrio")?.value||"normal",notes:$("#qNotes")?.value.trim()||null}});
    ALL.unshift(Object.assign(rows[0],{owner:{email:Cloud.me().email}}));
    renderApp(); toast("Task added");
    const q=$("#qTitle"); if(q){q.value="";q.focus();}
  }catch(e){
    if(String(e.message).includes("category")||String(e.message).includes("status"))

}

function bind(){
  $$("#content [data-range]").forEach(b=>b.onclick=()=>{RANGE=b.dataset.range;renderApp();});
  $$("#content [data-act]").forEach(b=>b.onclick=async()=>{
    const body={status:b.dataset.act}; if(b.dataset.act==="done")body.completed_at=nowISO();
    try{await patchTask(b.dataset.id,body);renderApp();toast(b.dataset.act==="done"?"Marked done":"Updated");
      if(b.dataset.act==="done"){const t=ALL.find(x=>x.id===b.dataset.id); if(t&&t.owner_id!==Cloud.me().id) Push.notify(t.owner_id,"Task completed",Cloud.me().email+" finished: "+t.title,"./");}
    }catch(e){toast(e.message);}
  });
  $$("#content [data-reopen]").forEach(b=>b.onclick=async()=>{
    const t=ALL.find(x=>x.id===b.dataset.reopen); if(!t) return;
    const mine=t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id;
    try{await patchTask(t.id,{status:mine?"open":"in_progress",completed_at:null});renderApp();toast("Reopened");}catch(e){toast(e.message);}
  });
  $$("#content [data-del]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Delete this task permanently?"))return;
    try{await Cloud.api(`cloud_tasks?id=eq.${b.dataset.del}`,{method:"DELETE",prefer:"return=minimal"});
      ALL=ALL.filter(t=>t.id!==b.dataset.del);renderApp();toast("Deleted");}catch(e){toast(e.message);}
  });
  $$("#content [data-edit]").forEach(b=>b.onclick=()=>{const t=ALL.find(x=>x.id===b.dataset.edit);if(t)editMine(t);});
  $$("#content [data-comment]").forEach(b=>b.onclick=()=>{const t=ALL.find(x=>x.id===b.dataset.comment);if(t)openComment(t);});
  $$("#content [data-reassign]").forEach(b=>b.onclick=()=>{const t=ALL.find(x=>x.id===b.dataset.reassign);if(t)openReassign(t);});
  const qa=$("#qAdd"); if(qa){qa.onclick=addMine; $("#qTitle").addEventListener("keydown",e=>{if(e.key==="Enter")addMine();});}
  const td=$("#toggleDone"); if(td)td.onclick=()=>{SHOWDONE=!SHOWDONE;renderApp();};
  const calStep=n=>{ const d=new Date(CALM.y,CALM.m,CALM.d||1);
    if(CALVIEW==="day") d.setDate(d.getDate()+n);
    else if(CALVIEW==="week") d.setDate(d.getDate()+7*n);
    else d.setMonth(d.getMonth()+n);
    CALM={y:d.getFullYear(),m:d.getMonth(),d:d.getDate()}; renderApp(); };
  const cp=$("#calPrev"); if(cp)cp.onclick=()=>calStep(-1);
  const cn=$("#calNext"); if(cn)cn.onclick=()=>calStep(1);
  $$("#content [data-calview]").forEach(b=>b.onclick=()=>{ CALVIEW=b.dataset.calview; if(CALM.d===undefined){const d=new Date();CALM.d=(CALM.y===d.getFullYear()&&CALM.m===d.getMonth())?d.getDate():1;} renderApp(); });
  $$("#content .calcell").forEach(c=>c.onclick=()=>{CALSEL=CALSEL===c.dataset.day?null:c.dataset.day;renderApp();});
  $$("#content [data-goday]").forEach(r=>r.onclick=()=>{const d=r.dataset.goday;CALM={y:+d.slice(0,4),m:+d.slice(5,7)-1,d:+d.slice(8,10)};CALSEL=d;renderApp();});
  const pe=$("#pushEnable"); if(pe) pe.onclick=async()=>{ try{ await Push.subscribe(); toast("Notifications enabled"); renderApp(); }catch(e){ toast(e.message); } };
  $$("#content [data-gotab]").forEach(c=>c.onclick=()=>{TAB=c.dataset.gotab;renderApp();});
  $$("#content [data-goto]").forEach(r=>r.onclick=()=>{
    const t=ALL.find(x=>x.id===r.dataset.goto); if(!t) return;
    TAB=(t.owner_id===Cloud.me().id&&t.assignee_id===Cloud.me().id)?"mine":"inbox";
    renderApp();
    const el=document.querySelector(`.task[data-id="${t.id}"]`);
    if(el){if(el.scrollIntoView)el.scrollIntoView({behavior:"smooth",block:"center"});el.style.borderLeftColor="var(--accent)";}
  });
  $$("#content [data-receipt]").forEach(a=>a.onclick=async(e)=>{e.preventDefault();try{window.open(await Cloud.signedUrl(a.dataset.receipt),"_blank");}catch(err){toast(err.message);}});
  const sv=$("#spSave"); if(sv)sv.onclick=recordSpend;
}

async function recordSpend(){
  const sv=$("#spSave");
  const amt=parseFloat($("#spAmt").value);
  if(!amt||amt<=0){toast("Enter a valid amount");return;}
  const ownerId=$("#spOwner")&&$("#spOwner").value;
  if(!ownerId){toast("No other people have accounts yet — a spend needs someone to owe it");return;}
  sv.disabled=true;
  try{
    let receipt=null;
    const f=$("#spFile").files[0];
    if(f){
      const safe=Date.now()+"-"+f.name.replace(/[^a-zA-Z0-9.\-_]/g,"_");
      receipt=await Cloud.upload(`${Cloud.me().id}/${safe}`,f);
    }
    await Cloud.api("transactions",{method:"POST",prefer:"return=minimal",body:{
      ledger_owner_id:ownerId,person_id:Cloud.me().id,type:"spend",amount:amt,
      currency:$("#spCur").value,description:$("#spDesc").value.trim()||null,
      task_id:$("#spTask").value||null,receipt_path:receipt,created_by:Cloud.me().id}});
    toast("Spend recorded");
      Push.notify(ownerId,"Spend recorded",Cloud.me().email+" spent "+$("#spCur").value+" "+amt.toFixed(2)+($("#spDesc").value?(" on "+$("#spDesc").value):""),"./");
      await loadAll();
  }catch(e){toast(e.message);}
  sv.disabled=false;
}

function show(signedIn){
  $("#authView").classList.toggle("hidden",signedIn);
  $("#appView").classList.toggle("hidden",!signedIn);
  $("#tabs").classList.toggle("hidden",!signedIn);
  document.body.classList.toggle("inapp",signedIn);
}

document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
document.addEventListener("DOMContentLoaded",()=>{
  $("#aIn").onclick=async()=>{try{await Cloud.signIn($("#aEmail").value.trim(),$("#aPass").value);show(true);loadAll().catch(e=>toast(e.message));}catch(e){toast(e.message);}};
  $("#aUp").onclick=async()=>{try{const ok=await Cloud.signUp($("#aEmail").value.trim(),$("#aPass").value);if(ok){show(true);loadAll().catch(e=>toast(e.message));}else toast("Account created — check your email to confirm, then sign in");}catch(e){toast(e.message);}};
  $("#outBtn").onclick=()=>{Cloud.store(null);show(false);};
  $("#refreshBtn").onclick=()=>loadAll().then(()=>toast("Refreshed")).catch(e=>toast(e.message));
  $$(".tabs button").forEach(b=>b.onclick=()=>{TAB=b.dataset.tab;renderApp();});
  if(Cloud.me()){show(true);loadAll().catch(e=>toast(e.message));}else show(false);
});
</script>
</body>
</html>
